name: publish

# Publish to PyPI when a version tag is pushed (e.g. v0.0.1, v1.2.3).
# Uses PyPI Trusted Publishing (OIDC) -- no API token in repo secrets.
# Configure the trusted publisher in PyPI:
#   https://pypi.org/manage/account/publishing/
#   * PyPI project name: fastcashflow
#   * Owner / repo:      seokhoonj / fastcashflow
#   * Workflow filename: publish.yml
#   * Environment name:  pypi

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # GitHub environment that the PyPI trusted publisher is bound to.
    environment:
      name: pypi
      url: https://pypi.org/p/fastcashflow

    # OIDC token used by pypa/gh-action-pypi-publish.
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
